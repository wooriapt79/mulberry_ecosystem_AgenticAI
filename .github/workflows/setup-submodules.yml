name: Setup Submodules

on:
  workflow_dispatch:

  jobs:
    setup-submodules:
        runs-on: ubuntu-latest
            steps:
                  - name: Checkout
                          uses: actions/checkout@v4
                                  with:
                                            token: ${{ secrets.GITHUB_TOKEN }}

                                                  - name: Configure Git
                                                          run: |
                                                                    git config user.name "github-actions[bot]"
                                                                              git config user.email "github-actions[bot]@users.noreply.github.com"

                                                                                    - name: Remove old .gitmodules
                                                                                            run: |
                                                                                                      if [ -f .gitmodules ]; then
                                                                                                                  git rm .gitmodules || rm .gitmodules
                                                                                                                            fi
                                                                                                                            
                                                                                                                                  - name: Add Submodules
                                                                                                                                          run: |
                                                                                                                                                    git submodule add https://github.com/wooriapt79/mulberry-research-lab.git mulberry-research-lab || echo "already exists"
                                                                                                                                                              git submodule add https://github.com/wooriapt79/agency-agents.git agency-agents || echo "already exists"
                                                                                                                                                                        git submodule add https://github.com/wooriapt79/everything-claude-code.git everything-claude-code || echo "already exists"
                                                                                                                                                                                  git submodule add https://github.com/wooriapt79/mulberry-research-lab-pageindex.git mulberry-research-lab-pageindex || echo "already exists"
                                                                                                                                                                                  
                                                                                                                                                                                        - name: Commit and Push
                                                                                                                                                                                                run: |
                                                                                                                                                                                                          git add .
                                                                                                                                                                                                                    git commit -m "feat: submodule 4개 자동 연결 (GitHub Actions)" || echo "nothing to commit"
                                                                                                                                                                                                                              git push
