name: Setup Submodules

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clean and re-add submodules
        run: |
          git submodule deinit -f --all 2>/dev/null || true
          git rm --cached -r mulberry-research-lab agency-agents everything-claude-code mulberry-research-lab-pageindex Mulberry-Agent-Team-Formation-System 2>/dev/null || true
          rm -rf .git/modules/mulberry-research-lab .git/modules/agency-agents .git/modules/everything-claude-code .git/modules/mulberry-research-lab-pageindex ".git/modules/Mulberry-Agent-Team-Formation-System"
          rm -rf mulberry-research-lab agency-agents everything-claude-code mulberry-research-lab-pageindex Mulberry-Agent-Team-Formation-System
          echo -n > .gitmodules
          git submodule add https://github.com/wooriapt79/mulberry-research-lab.git mulberry-research-lab
          git submodule add https://github.com/wooriapt79/agency-agents.git agency-agents
          git submodule add https://github.com/wooriapt79/everything-claude-code.git everything-claude-code
          git submodule add https://github.com/wooriapt79/mulberry-research-lab-pageindex.git mulberry-research-lab-pageindex
          git submodule add https://github.com/wooriapt79/Mulberry-Agent-Team-Formation-System.git Mulberry-Agent-Team-Formation-System

      - name: Commit and Push
        run: |
          git add .
          git commit -m "feat: 5 submodules connected" || echo "nothing to commit"
          git push
