openapi: 3.1.0
info:
  title: Mulberry Zero-Setup Onboarding API
  version: 1.0.0

paths:
  /onboarding/start:
    post:
      summary: Start onboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, workspace_name, template]
              properties:
                user_id: { type: string }
                workspace_name: { type: string }
                template: { type: string }
      responses:
        "202":
          description: queued

  /onboarding/status/{job_id}:
    get:
      summary: Get onboarding status
      parameters:
        - in: path
          name: job_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: status response

  /onboarding/recover:
    post:
      summary: Recover onboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_id, action]
              properties:
                job_id: { type: string }
                action:
                  type: string
                  enum: [retry_push, switch_to_zip_backup, recreate_repo, abort]
      responses:
        "202":
          description: recovering
